name: Testbench Regression Live

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

concurrency:
  group: testbench-regression-live-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  regression-live:
    name: Backend Testbench (Regression-Live)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTBENCH_RUN_ID: regression-live-${{ github.run_id }}
      PYTHONUNBUFFERED: "1"
      SUSANOH_TESTBENCH_STAGING_BASE_URL: ${{ secrets.SUSANOH_TESTBENCH_STAGING_BASE_URL }}
      SUSANOH_TESTBENCH_STAGING_USERNAME: ${{ secrets.SUSANOH_TESTBENCH_STAGING_USERNAME }}
      SUSANOH_TESTBENCH_STAGING_PASSWORD: ${{ secrets.SUSANOH_TESTBENCH_STAGING_PASSWORD }}
      SUSANOH_TESTBENCH_STAGING_API_KEY: ${{ secrets.SUSANOH_TESTBENCH_STAGING_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate staging configuration
        id: config
        run: |
          missing=()
          if [ -z "$SUSANOH_TESTBENCH_STAGING_BASE_URL" ]; then
            missing+=("SUSANOH_TESTBENCH_STAGING_BASE_URL")
          fi
          if [ -z "$SUSANOH_TESTBENCH_STAGING_PASSWORD" ]; then
            missing+=("SUSANOH_TESTBENCH_STAGING_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "Regression-Live skipped."
              echo
              echo "Missing required secrets: ${missing[*]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$SUSANOH_TESTBENCH_STAGING_USERNAME" ]; then
            echo "SUSANOH_TESTBENCH_STAGING_USERNAME=admin" >> "$GITHUB_ENV"
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Run Regression-Live Testbench
        if: steps.config.outputs.configured == 'true'
        run: |
          python -m backend.testbench_runner \
            --profile staging \
            --mode live \
            --run-id "$TESTBENCH_RUN_ID" \
            --scenario fraud_smurfing_fan_in \
            --scenario fraud_direct_rmt_chat \
            --scenario legit_new_season_rewards \
            --scenario legit_friend_gifts_low_value

      - name: Publish Regression-Live Report
        if: always() && steps.config.outputs.configured == 'true'
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}/junit.xml
          check_name: Testbench Regression-Live Report

      - name: Append Regression-Live Summary
        if: always() && steps.config.outputs.configured == 'true'
        run: |
          report_path="artifacts/testbench/$TESTBENCH_RUN_ID/report.md"
          if [ -f "$report_path" ]; then
            cat "$report_path" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Regression-Live Artifacts
        if: always() && steps.config.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: testbench-regression-live-${{ github.run_id }}
          path: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}
          if-no-files-found: warn
          retention-days: 14
