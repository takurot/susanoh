name: Testbench Soak

on:
  schedule:
    - cron: "0 19 * * 6"
  workflow_dispatch:

concurrency:
  group: testbench-soak-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  soak:
    name: Backend Testbench (Soak)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      TESTBENCH_RUN_ID: soak-${{ github.run_id }}
      PYTHONUNBUFFERED: "1"
      TESTBENCH_SOAK_ITERATIONS: ${{ vars.SUSANOH_TESTBENCH_SOAK_ITERATIONS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Soak Testbench
        run: |
          soak_args=()
          if [ -n "${TESTBENCH_SOAK_ITERATIONS:-}" ]; then
            soak_args+=(--soak-iterations "$TESTBENCH_SOAK_ITERATIONS")
          fi

          python -m backend.testbench_runner \
            --profile local \
            --mode soak \
            --run-id "$TESTBENCH_RUN_ID" \
            "${soak_args[@]}"

      - name: Publish Soak Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}/junit.xml
          check_name: Testbench Soak Report

      - name: Append Soak Summary
        if: always()
        run: |
          report_path="artifacts/testbench/$TESTBENCH_RUN_ID/report.md"
          if [ -f "$report_path" ]; then
            cat "$report_path" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Soak Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbench-soak-${{ github.run_id }}
          path: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}
          if-no-files-found: warn
          retention-days: 30
