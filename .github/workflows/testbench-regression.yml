name: Testbench Regression

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: testbench-regression-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  regression:
    name: Backend Testbench (Regression)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TESTBENCH_RUN_ID: regression-${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Regression Testbench
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m backend.testbench_runner \
            --profile local \
            --mode regression \
            --run-id "$TESTBENCH_RUN_ID"

      - name: Publish Regression Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}/junit.xml
          check_name: Testbench Regression Report

      - name: Append Regression Summary
        if: always()
        run: |
          report_path="artifacts/testbench/$TESTBENCH_RUN_ID/report.md"
          if [ -f "$report_path" ]; then
            cat "$report_path" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Regression Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbench-regression-${{ github.run_id }}
          path: artifacts/testbench/${{ env.TESTBENCH_RUN_ID }}
          if-no-files-found: warn
          retention-days: 14
